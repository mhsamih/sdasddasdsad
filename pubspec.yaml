name: husoon_app
description: الحصون الخمسة - Quran Memorization App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_local_notifications: ^16.3.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  audioplayers: ^5.2.1
  lottie: ^3.0.0
  table_calendar: ^3.1.0
  fl_chart: ^0.66.2
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
